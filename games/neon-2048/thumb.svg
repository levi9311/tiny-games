<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#222244" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="30" x2="320" y2="30"/><line x1="0" y1="60" x2="320" y2="60"/>
    <line x1="0" y1="90" x2="320" y2="90"/><line x1="0" y1="120" x2="320" y2="120"/>
    <line x1="0" y1="150" x2="320" y2="150"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
  </g>
  <!-- Grid background -->
  <rect x="80" y="20" width="160" height="140" rx="8" fill="#111122" stroke="#333355" stroke-width="1"/>
  <!-- Grid cells -->
  <g fill="#1a1a2e" stroke="#222244" stroke-width="0.5">
    <rect x="90" y="30" width="33" height="28" rx="3"/>
    <rect x="127" y="30" width="33" height="28" rx="3"/>
    <rect x="164" y="30" width="33" height="28" rx="3"/>
    <rect x="201" y="30" width="33" height="28" rx="3"/>
    <rect x="90" y="62" width="33" height="28" rx="3"/>
    <rect x="127" y="62" width="33" height="28" rx="3"/>
    <rect x="164" y="62" width="33" height="28" rx="3"/>
    <rect x="201" y="62" width="33" height="28" rx="3"/>
    <rect x="90" y="94" width="33" height="28" rx="3"/>
    <rect x="127" y="94" width="33" height="28" rx="3"/>
    <rect x="164" y="94" width="33" height="28" rx="3"/>
    <rect x="201" y="94" width="33" height="28" rx="3"/>
    <rect x="90" y="126" width="33" height="28" rx="3"/>
    <rect x="127" y="126" width="33" height="28" rx="3"/>
    <rect x="164" y="126" width="33" height="28" rx="3"/>
    <rect x="201" y="126" width="33" height="28" rx="3"/>
  </g>
  <!-- Tiles -->
  <g filter="url(#glow)">
    <!-- 2 -->
    <rect x="90" y="30" width="33" height="28" rx="3" fill="#1a1a4a" stroke="#00FFFF" stroke-width="1.5" opacity="0.9"/>
    <text x="106" y="49" text-anchor="middle" fill="#00FFFF" font-family="monospace" font-size="14" font-weight="bold">2</text>
    <!-- 4 -->
    <rect x="127" y="30" width="33" height="28" rx="3" fill="#1a2a1a" stroke="#00FF88" stroke-width="1.5" opacity="0.9"/>
    <text x="143" y="49" text-anchor="middle" fill="#00FF88" font-family="monospace" font-size="14" font-weight="bold">4</text>
    <!-- 8 -->
    <rect x="164" y="62" width="33" height="28" rx="3" fill="#2a1a3a" stroke="#FF00FF" stroke-width="1.5" opacity="0.9"/>
    <text x="180" y="81" text-anchor="middle" fill="#FF00FF" font-family="monospace" font-size="14" font-weight="bold">8</text>
    <!-- 16 -->
    <rect x="127" y="62" width="33" height="28" rx="3" fill="#3a1a1a" stroke="#FF0040" stroke-width="1.5" opacity="0.9"/>
    <text x="143" y="81" text-anchor="middle" fill="#FF0040" font-family="monospace" font-size="12" font-weight="bold">16</text>
    <!-- 32 -->
    <rect x="201" y="94" width="33" height="28" rx="3" fill="#3a2a1a" stroke="#FF8800" stroke-width="1.5" opacity="0.9"/>
    <text x="217" y="113" text-anchor="middle" fill="#FF8800" font-family="monospace" font-size="12" font-weight="bold">32</text>
    <!-- 64 -->
    <rect x="90" y="126" width="33" height="28" rx="3" fill="#3a3a1a" stroke="#FFEE00" stroke-width="1.5" opacity="0.9"/>
    <text x="106" y="145" text-anchor="middle" fill="#FFEE00" font-family="monospace" font-size="12" font-weight="bold">64</text>
  </g>
  <!-- Title -->
  <text x="10" y="175" fill="#00FFFF" font-family="monospace" font-size="11" font-weight="bold" filter="url(#glow)" opacity="0.7">NEON 2048</text>
</svg>