<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/><stop offset="100%" style="stop-color:#1a0a2a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#222244" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="30" x2="320" y2="30"/><line x1="0" y1="60" x2="320" y2="60"/>
    <line x1="0" y1="90" x2="320" y2="90"/><line x1="0" y1="120" x2="320" y2="120"/>
    <line x1="0" y1="150" x2="320" y2="150"/>
    <line x1="60" y1="0" x2="60" y2="180"/><line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/><line x1="240" y1="0" x2="240" y2="180"/>
  </g>
  <!-- Face-down cards -->
  <g filter="url(#glow)">
    <!-- Row 1 -->
    <rect x="40" y="20" width="55" height="72" rx="6" fill="#1a1a3e" stroke="#333366" stroke-width="1.5"/>
    <rect x="105" y="20" width="55" height="72" rx="6" fill="#1a1a3e" stroke="#333366" stroke-width="1.5"/>
    <rect x="170" y="20" width="55" height="72" rx="6" fill="#0d0d1a" stroke="#00FFFF" stroke-width="1.5"/>
    <!-- Row 2 -->
    <rect x="40" y="102" width="55" height="72" rx="6" fill="#0d0d1a" stroke="#FF00FF" stroke-width="1.5"/>
    <rect x="105" y="102" width="55" height="72" rx="6" fill="#1a1a3e" stroke="#333366" stroke-width="1.5"/>
    <rect x="170" y="102" width="55" height="72" rx="6" fill="#0d0d1a" stroke="#00FF88" stroke-width="1.5"/>
  </g>
  <!-- Face-up cards with symbols -->
  <g filter="url(#glow)">
    <!-- Lightning -->
    <rect x="235" y="20" width="55" height="72" rx="6" fill="#0d0d1a" stroke="#00FFFF" stroke-width="1.5"/>
    <text x="262" y="65" text-anchor="middle" font-size="28">⚡</text>
    <!-- Crystal -->
    <rect x="235" y="102" width="55" height="72" rx="6" fill="#0d0d1a" stroke="#FF00FF" stroke-width="1.5"/>
    <text x="262" y="147" text-anchor="middle" font-size="28">💎</text>
    <!-- DNA -->
    <rect x="40" y="20" width="55" height="72" rx="6" fill="#0d0d1a" stroke="#00FF88" stroke-width="1.5" opacity="0.5"/>
    <text x="67" y="65" text-anchor="middle" font-size="28" opacity="0.5">🧬</text>
  </g>
  <!-- Face-down card pattern on first card -->
  <rect x="40" y="20" width="55" height="72" rx="6" fill="#1a1a3e" stroke="#333366" stroke-width="1.5"/>
  <g opacity="0.3">
    <line x1="45" y1="30" x2="90" y2="30" stroke="#444488" stroke-width="0.5"/>
    <line x1="45" y1="38" x2="90" y2="38" stroke="#444488" stroke-width="0.5"/>
    <line x1="45" y1="46" x2="90" y2="46" stroke="#444488" stroke-width="0.5"/>
    <line x1="45" y1="54" x2="90" y2="54" stroke="#444488" stroke-width="0.5"/>
    <line x1="45" y1="62" x2="90" y2="62" stroke="#444488" stroke-width="0.5"/>
    <line x1="45" y1="70" x2="90" y2="70" stroke="#444488" stroke-width="0.5"/>
    <line x1="45" y1="78" x2="90" y2="78" stroke="#444488" stroke-width="0.5"/>
    <line x1="45" y1="86" x2="90" y2="86" stroke="#444488" stroke-width="0.5"/>
  </g>
  <text x="67" y="60" text-anchor="middle" fill="#444488" font-family="monospace" font-size="9" font-weight="bold" letter-spacing="2">NEON</text>
  <!-- Title -->
  <text x="10" y="175" fill="#00FFFF" font-family="monospace" font-size="11" font-weight="bold" filter="url(#glow)" opacity="0.7">NEON MEMORY</text>
  <text x="230" y="175" fill="#FF00FF" font-family="monospace" font-size="9" filter="url(#glow)" opacity="0.5">🧠 MATCH</text>
</svg>