<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05051a"/>
      <stop offset="100%" style="stop-color:#0f0a2e"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="1" height="20" fill="rgba(0,255,255,0.04)"/>
      <rect width="20" height="1" fill="rgba(0,255,255,0.04)"/>
    </pattern>
  </defs>

  <rect width="400" height="200" fill="url(#bg)"/>
  <rect width="400" height="200" fill="url(#grid)"/>

  <!-- Skyline silhouette -->
  <g opacity="0.6">
    <rect x="10" y="100" width="40" height="80" fill="#0d0d2a"/>
    <rect x="50" y="70" width="30" height="110" fill="#0c0c25"/>
    <rect x="85" y="90" width="50" height="90" fill="#0d0d2a"/>
    <rect x="140" y="60" width="35" height="120" fill="#0c0c25"/>
    <rect x="180" y="80" width="45" height="100" fill="#0d0d2a"/>
    <rect x="230" y="55" width="30" height="125" fill="#0c0c25"/>
    <rect x="265" y="85" width="55" height="95" fill="#0d0d2a"/>
    <rect x="325" y="65" width="35" height="115" fill="#0c0c25"/>
    <rect x="365" y="95" width="35" height="85" fill="#0d0d2a"/>
    <!-- Windows -->
    <g fill="rgba(0,255,255,0.15)">
      <rect x="55" y="75" width="4" height="5"/><rect x="65" y="75" width="4" height="5"/>
      <rect x="55" y="85" width="4" height="5"/><rect x="65" y="95" width="4" height="5"/>
      <rect x="145" y="65" width="4" height="5"/><rect x="155" y="75" width="4" height="5"/>
      <rect x="145" y="85" width="4" height="5"/>
      <rect x="235" y="60" width="4" height="5"/><rect x="245" y="70" width="4" height="5"/>
      <rect x="335" y="70" width="4" height="5"/><rect x="345" y="80" width="4" height="5"/>
      <rect x="95" y="95" width="4" height="5"/><rect x="105" y="105" width="4" height="5"/>
      <rect x="115" y="95" width="4" height="5"/>
      <rect x="190" y="85" width="4" height="5"/><rect x="200" y="95" width="4" height="5"/>
      <rect x="210" y="85" width="4" height="5"/>
      <rect x="275" y="90" width="4" height="5"/><rect x="285" y="100" width="4" height="5"/>
      <rect x="295" y="90" width="4" height="5"/><rect x="305" y="100" width="4" height="5"/>
    </g>
  </g>

  <!-- Ground -->
  <rect x="0" y="170" width="400" height="30" fill="#111"/>
  <line x1="0" y1="170" x2="400" y2="170" stroke="#0ff" stroke-width="2" opacity="0.4"/>

  <!-- Lane dashes -->
  <g stroke="rgba(0,255,255,0.1)" stroke-width="1" stroke-dasharray="8 6">
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="145" x2="400" y2="145"/>
  </g>

  <!-- Speed lines -->
  <g stroke="rgba(0,255,255,0.15)" stroke-width="1">
    <line x1="100" y1="115" x2="60" y2="115"/>
    <line x1="200" y1="140" x2="150" y2="140"/>
    <line x1="300" y1="125" x2="260" y2="125"/>
    <line x1="150" y1="160" x2="120" y2="160"/>
    <line x1="350" y1="155" x2="310" y2="155"/>
  </g>

  <!-- Runner (emoji) -->
  <g filter="url(#g)">
    <text x="80" y="140" font-family="serif" font-size="32" text-anchor="middle">🤖</text>
  </g>

  <!-- Obstacles -->
  <g filter="url(#g)">
    <text x="180" y="140" font-family="serif" font-size="28" text-anchor="middle">🧱</text>
    <text x="250" y="118" font-family="serif" font-size="26" text-anchor="middle">🔺</text>
    <text x="320" y="148" font-family="serif" font-size="28" text-anchor="middle">📡</text>
  </g>

  <!-- Energy orbs -->
  <g filter="url(#g)">
    <text x="140" y="118" font-family="serif" font-size="18" text-anchor="middle">⚡</text>
    <text x="280" y="140" font-family="serif" font-size="18" text-anchor="middle">⚡</text>
    <text x="210" y="160" font-family="serif" font-size="16" text-anchor="middle">⚡</text>
  </g>

  <!-- Title -->
  <g filter="url(#g)">
    <text x="200" y="42" font-family="'Courier New',monospace" font-weight="bold" font-size="28" fill="#00ffff" text-anchor="middle" letter-spacing="4">HACK RUNNER</text>
  </g>
  <text x="200" y="58" font-family="'Courier New',monospace" font-size="10" fill="#ff00ff" text-anchor="middle" opacity="0.6" letter-spacing="1">🏃 CYBERPUNK ENDLESS RUNNER ⚡</text>

  <!-- Corner brackets -->
  <g stroke="#00ffff" stroke-width="1.5" fill="none" opacity="0.4">
    <polyline points="10,25 10,10 25,10"/>
    <polyline points="375,10 390,10 390,25"/>
    <polyline points="10,175 10,190 25,190"/>
    <polyline points="375,190 390,190 390,175"/>
  </g>
</svg>
