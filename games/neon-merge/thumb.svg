<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowBig"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="1" height="20" fill="rgba(0,255,255,0.06)"/>
      <rect width="20" height="1" fill="rgba(0,255,255,0.06)"/>
    </pattern>
  </defs>

  <rect width="400" height="200" fill="url(#bg)"/>
  <rect width="400" height="200" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <g stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.5">
    <polyline points="12,28 12,12 28,12"/>
    <polyline points="372,12 388,12 388,28"/>
    <polyline points="12,172 12,188 28,188"/>
    <polyline points="372,188 388,188 388,172"/>
  </g>

  <!-- Grid area (subtle) -->
  <rect x="40" y="30" width="200" height="150" fill="none" stroke="rgba(0,255,255,0.08)" stroke-width="1" rx="4"/>
  <!-- Vertical grid lines -->
  <g stroke="rgba(0,255,255,0.04)" stroke-width="1">
    <line x1="73" y1="30" x2="73" y2="180"/>
    <line x1="106" y1="30" x2="106" y2="180"/>
    <line x1="139" y1="30" x2="139" y2="180"/>
    <line x1="172" y1="30" x2="172" y2="180"/>
    <line x1="206" y1="30" x2="206" y2="180"/>
  </g>
  <!-- Horizontal grid lines -->
  <g stroke="rgba(0,255,255,0.04)" stroke-width="1">
    <line x1="40" y1="55" x2="240" y2="55"/>
    <line x1="40" y1="80" x2="240" y2="80"/>
    <line x1="40" y1="105" x2="240" y2="105"/>
    <line x1="40" y1="130" x2="240" y2="130"/>
    <line x1="40" y1="155" x2="240" y2="155"/>
  </g>
  <!-- Danger line -->
  <line x1="40" y1="42" x2="240" y2="42" stroke="rgba(255,0,64,0.3)" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ===== Orbs in grid ===== -->
  <!-- Row 4: Cyan (Lv1) x2 side by side -->
  <g filter="url(#glow)">
    <circle cx="63" cy="142" r="14" fill="rgba(0,255,255,0.15)" stroke="#00ffff" stroke-width="2"/>
    <circle cx="63" cy="142" r="5" fill="#00ffff"/>
    <text x="63" y="146" font-family="monospace" font-weight="bold" font-size="12" fill="#000" text-anchor="middle">1</text>
  </g>
  <g filter="url(#glow)">
    <circle cx="96" cy="142" r="14" fill="rgba(0,255,255,0.15)" stroke="#00ffff" stroke-width="2"/>
    <circle cx="96" cy="142" r="5" fill="#00ffff"/>
    <text x="96" y="146" font-family="monospace" font-weight="bold" font-size="12" fill="#000" text-anchor="middle">1</text>
  </g>

  <!-- Arrow pointing down between merging orbs -->
  <g opacity="0.6">
    <line x1="80" y1="118" x2="80" y2="110" stroke="#ffee00" stroke-width="2" marker-end="none"/>
    <polygon points="76,112 80,106 84,112" fill="#ffee00"/>
  </g>

  <!-- Row 3: Green (Lv2) - result of merge -->
  <g filter="url(#glow)">
    <circle cx="80" cy="92" r="14" fill="rgba(0,255,136,0.15)" stroke="#00ff88" stroke-width="2"/>
    <circle cx="80" cy="92" r="5" fill="#00ff88"/>
    <text x="80" y="96" font-family="monospace" font-weight="bold" font-size="12" fill="#000" text-anchor="middle">2</text>
  </g>

  <!-- Row 3: Yellow (Lv3) -->
  <g filter="url(#glow)">
    <circle cx="145" cy="92" r="14" fill="rgba(255,238,0,0.15)" stroke="#ffee00" stroke-width="2"/>
    <circle cx="145" cy="92" r="5" fill="#ffee00"/>
    <text x="145" y="96" font-family="monospace" font-weight="bold" font-size="12" fill="#000" text-anchor="middle">3</text>
  </g>
  <g filter="url(#glow)">
    <circle cx="178" cy="92" r="14" fill="rgba(255,238,0,0.15)" stroke="#ffee00" stroke-width="2"/>
    <circle cx="178" cy="92" r="5" fill="#ffee00"/>
    <text x="178" y="96" font-family="monospace" font-weight="bold" font-size="12" fill="#000" text-anchor="middle">3</text>
  </g>

  <!-- Row 2: Orange (Lv4) - result of yellow merge -->
  <g filter="url(#glow)">
    <circle cx="162" cy="67" r="14" fill="rgba(255,136,0,0.15)" stroke="#ff8800" stroke-width="2"/>
    <circle cx="162" cy="67" r="5" fill="#ff8800"/>
    <text x="162" y="71" font-family="monospace" font-weight="bold" font-size="12" fill="#000" text-anchor="middle">4</text>
  </g>

  <!-- Row 4: Magenta (Lv6) -->
  <g filter="url(#glow)">
    <circle cx="200" cy="142" r="14" fill="rgba(255,0,255,0.15)" stroke="#ff00ff" stroke-width="2"/>
    <circle cx="200" cy="142" r="5" fill="#ff00ff"/>
    <text x="200" y="146" font-family="monospace" font-weight="bold" font-size="12" fill="#000" text-anchor="middle">6</text>
  </g>

  <!-- Merge spark effect -->
  <g filter="url(#glow)">
    <circle cx="80" cy="92" r="22" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>
    <circle cx="162" cy="67" r="22" fill="none" stroke="#ff8800" stroke-width="1" opacity="0.4" stroke-dasharray="4 4"/>
  </g>

  <!-- Merge particles -->
  <g fill="#00ffff" opacity="0.6" filter="url(#glow)">
    <rect x="50" y="112" width="4" height="4" rx="1"/>
    <rect x="108" y="108" width="3" height="3"/>
    <rect x="65" y="104" width="4" height="4" rx="1"/>
  </g>
  <g fill="#ffee00" opacity="0.5" filter="url(#glow)">
    <rect x="132" y="72" width="3" height="3"/>
    <rect x="190" y="76" width="4" height="4" rx="1"/>
    <rect x="152" y="80" width="3" height="3"/>
  </g>

  <!-- ===== Title ===== -->
  <g filter="url(#glow)">
    <text x="320" y="90" font-family="'Courier New',monospace" font-weight="bold" font-size="26" fill="#ff00ff" text-anchor="middle" letter-spacing="3">NEON</text>
    <text x="320" y="124" font-family="'Courier New',monospace" font-weight="bold" font-size="26" fill="#00ffff" text-anchor="middle" letter-spacing="3">MERGE</text>
  </g>

  <!-- Subtitle -->
  <text x="320" y="148" font-family="'Courier New',monospace" font-size="10" fill="#ff00ff" text-anchor="middle" opacity="0.5" letter-spacing="1">🔮 MERGE CHALLENGE 🔮</text>

  <!-- Evolution arrow hint -->
  <g transform="translate(320, 158)" opacity="0.4">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#00ff88" text-anchor="middle">1→2→3→4→...</text>
  </g>

  <!-- Bottom accent -->
  <line x1="260" y1="135" x2="380" y2="135" stroke="#ff00ff" stroke-width="1" opacity="0.2"/>
</svg>
