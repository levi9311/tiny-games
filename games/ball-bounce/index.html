<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Bounce</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0f23;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        #gameCanvas {
            border: 3px solid #00aaff;
            border-radius: 8px;
            background: linear-gradient(#0a0a1a, #1a1a3a);
        }
        #score {
            color: #00aaff;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00aaff;
        }
        #instructions {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div id="instructions">← → Move Paddle</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        let lives = 3;
        let gameOver = false;
        let keys = {};

        const paddle = {
            x: canvas.width / 2 - 50,
            y: canvas.height - 30,
            width: 100,
            height: 15,
            speed: 8,
            color: '#00aaff'
        };

        let balls = [];
        let bricks = [];
        const ballRadius = 8;
        const brickRows = 5;
        const brickCols = 8;
        const brickWidth = 45;
        const brickHeight = 20;
        const brickPadding = 5;
        const brickOffsetTop = 50;
        const brickOffsetLeft = 12;

        function createBricks() {
            bricks = [];
            for (let row = 0; row < brickRows; row++) {
                bricks[row] = [];
                for (let col = 0; col < brickCols; col++) {
                    bricks[row][col] = {
                        x: col * (brickWidth + brickPadding) + brickOffsetLeft,
                        y: row * (brickHeight + brickPadding) + brickOffsetTop,
                        width: brickWidth,
                        height: brickHeight,
                        active: true,
                        color: `hsl(${row * 40}, 80%, 50%)`
                    };
                }
            }
        }

        function spawnBall() {
            balls.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 6,
                vy: -4,
                speed: 5,
                color: '#ffcc00'
            });
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (gameOver && e.key === 'Enter') {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function resetGame() {
            score = 0;
            lives = 3;
            gameOver = false;
            balls = [];
            paddle.x = canvas.width / 2 - 50;
            createBricks();
            spawnBall();
            scoreEl.textContent = 'Score: 0 | Lives: 3';
        }

        function update() {
            if (gameOver) return;

            if (keys['ArrowLeft'] && paddle.x > 0) {
                paddle.x -= paddle.speed;
            }
            if (keys['ArrowRight'] && paddle.x < canvas.width - paddle.width) {
                paddle.x += paddle.speed;
            }

            for (let b = balls.length - 1; b >= 0; b--) {
                let ball = balls[b];
                ball.x += ball.vx;
                ball.y += ball.vy;

                if (ball.x - ballRadius < 0 || ball.x + ballRadius > canvas.width) {
                    ball.vx = -ball.vx;
                }
                if (ball.y - ballRadius < 0) {
                    ball.vy = -ball.vy;
                }

                if (ball.y + ballRadius > paddle.y &&
                    ball.x > paddle.x &&
                    ball.x < paddle.x + paddle.width &&
                    ball.vy > 0) {
                    let hitPos = (ball.x - paddle.x) / paddle.width;
                    ball.vx = (hitPos - 0.5) * 8;
                    ball.vy = -Math.abs(ball.vy);
                }

                if (ball.y - ballRadius > canvas.height) {
                    balls.splice(b, 1);
                    lives--;
                    scoreEl.textContent = 'Score: ' + score + ' | Lives: ' + lives;
                    
                    if (lives <= 0) {
                        gameOver = true;
                    } else if (balls.length === 0) {
                        spawnBall();
                    }
                }

                for (let row = 0; row < brickRows; row++) {
                    for (let col = 0; col < brickCols; col++) {
                        let brick = bricks[row][col];
                        if (brick.active &&
                            ball.x + ballRadius > brick.x &&
                            ball.x - ballRadius < brick.x + brick.width &&
                            ball.y + ballRadius > brick.y &&
                            ball.y - ballRadius < brick.y + brick.height) {
                            
                            brick.active = false;
                            ball.vy = -ball.vy;
                            score += 10;
                            scoreEl.textContent = 'Score: ' + score + ' | Lives: ' + lives;

                            if (bricks.every(r => r.every(b => !b.active))) {
                                createBricks();
                                spawnBall();
                            }
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = paddle.color;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

            balls.forEach(ball => {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
                ctx.fillStyle = ball.color;
                ctx.fill();
                ctx.closePath();
            });

            bricks.forEach(row => {
                row.forEach(brick => {
                    if (brick.active) {
                        ctx.fillStyle = brick.color;
                        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                        
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(brick.x, brick.y, brick.width, 3);
                    }
                });
            });

            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('Lives: ' + lives, 10, 20);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = '20px Arial';
                ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('Press Enter to Restart', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        createBricks();
        spawnBall();
        gameLoop();
    </script>
</body>
</html>
