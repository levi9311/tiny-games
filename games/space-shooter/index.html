<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a1a;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        #gameCanvas {
            border: 3px solid #4a4a8a;
            border-radius: 8px;
            background: linear-gradient(#0a0a2a, #1a1a4a);
        }
        #score {
            color: #0ff;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #0ff;
        }
        #instructions {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div id="instructions">← → Move | Space: Shoot</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        let gameOver = false;
        let keys = {};

        const player = {
            x: canvas.width / 2 - 20,
            y: canvas.height - 60,
            width: 40,
            height: 30,
            speed: 6,
            color: '#00ff88'
        };

        let bullets = [];
        let enemies = [];
        let enemySpeed = 2;
        let spawnRate = 90;
        let frameCount = 0;
        let shootCooldown = 0;

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (gameOver && e.key === 'Enter') {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function resetGame() {
            score = 0;
            gameOver = false;
            bullets = [];
            enemies = [];
            enemySpeed = 2;
            spawnRate = 90;
            player.x = canvas.width / 2 - 20;
            frameCount = 0;
            scoreEl.textContent = 'Score: 0';
        }

        function spawnEnemy() {
            const size = Math.random() * 20 + 25;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                color: `hsl(${Math.random() * 60}, 80%, 50%)`
            });
        }

        function update() {
            if (gameOver) return;

            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }

            if (keys[' '] && shootCooldown <= 0) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 15,
                    speed: 8
                });
                shootCooldown = 15;
            }
            if (shootCooldown > 0) shootCooldown--;

            frameCount++;
            if (frameCount % spawnRate === 0) {
                spawnEnemy();
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.y += enemySpeed;

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let bullet = bullets[j];
                    if (
                        bullet.x < enemy.x + enemy.width &&
                        bullet.x + bullet.width > enemy.x &&
                        bullet.y < enemy.y + enemy.height &&
                        bullet.y + bullet.height > enemy.y
                    ) {
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        scoreEl.textContent = 'Score: ' + score;
                        
                        if (score % 50 === 0) {
                            enemySpeed += 0.3;
                            spawnRate = Math.max(40, spawnRate - 5);
                        }
                        break;
                    }
                }

                if (enemies[i] && enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    gameOver = true;
                }

                if (enemies[i] &&
                    player.x < enemies[i].x + enemies[i].width &&
                    player.x + player.width > enemies[i].x &&
                    player.y < enemies[i].y + enemies[i].height &&
                    player.y + player.height > enemies[i].y
                ) {
                    gameOver = true;
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#ff0';
            bullets.forEach(bullet => {
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            });

            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
            });

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = '20px Arial';
                ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('Press Enter to Restart', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
