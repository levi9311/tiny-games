<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#0A1020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(0,255,255,0.06)" stroke-width="0.5">
    <line x1="120" y1="40" x2="120" y2="280"/>
    <line x1="140" y1="40" x2="140" y2="280"/>
    <line x1="160" y1="40" x2="160" y2="280"/>
    <line x1="180" y1="40" x2="180" y2="280"/>
    <line x1="200" y1="40" x2="200" y2="280"/>
    <line x1="220" y1="40" x2="220" y2="280"/>
    <line x1="240" y1="40" x2="240" y2="280"/>
    <line x1="260" y1="40" x2="260" y2="280"/>
    <line x1="280" y1="40" x2="280" y2="280"/>
    <line x1="120" y1="60" x2="300" y2="60"/>
    <line x1="120" y1="80" x2="300" y2="80"/>
    <line x1="120" y1="100" x2="300" y2="100"/>
    <line x1="120" y1="120" x2="300" y2="120"/>
    <line x1="120" y1="140" x2="300" y2="140"/>
    <line x1="120" y1="160" x2="300" y2="160"/>
    <line x1="120" y1="180" x2="300" y2="180"/>
    <line x1="120" y1="200" x2="300" y2="200"/>
    <line x1="120" y1="220" x2="300" y2="220"/>
    <line x1="120" y1="240" x2="300" y2="240"/>
    <line x1="120" y1="260" x2="300" y2="260"/>
  </g>

  <!-- Board border -->
  <rect x="120" y="40" width="180" height="240" fill="none" stroke="rgba(0,255,255,0.3)" stroke-width="1.5" rx="2"/>

  <!-- Placed blocks (bottom rows) -->
  <g filter="url(#glow)">
    <!-- Row: Z piece (red) -->
    <rect x="120" y="240" width="20" height="20" fill="#FF0040" opacity="0.8"/>
    <rect x="140" y="240" width="20" height="20" fill="#FF0040" opacity="0.8"/>
    <rect x="140" y="260" width="20" height="20" fill="#FF0040" opacity="0.8"/>
    <rect x="160" y="260" width="20" height="20" fill="#FF0040" opacity="0.8"/>

    <!-- L piece (orange) -->
    <rect x="200" y="240" width="20" height="20" fill="#FF8800" opacity="0.8"/>
    <rect x="220" y="240" width="20" height="20" fill="#FF8800" opacity="0.8"/>
    <rect x="240" y="240" width="20" height="20" fill="#FF8800" opacity="0.8"/>
    <rect x="240" y="220" width="20" height="20" fill="#FF8800" opacity="0.8"/>

    <!-- J piece (blue) -->
    <rect x="260" y="240" width="20" height="20" fill="#4488FF" opacity="0.8"/>
    <rect x="280" y="240" width="20" height="20" fill="#4488FF" opacity="0.8"/>
    <rect x="260" y="220" width="20" height="20" fill="#4488FF" opacity="0.8"/>
    <rect x="260" y="200" width="20" height="20" fill="#4488FF" opacity="0.8"/>

    <!-- S piece (green) -->
    <rect x="160" y="240" width="20" height="20" fill="#00FF88" opacity="0.8"/>
    <rect x="180" y="240" width="20" height="20" fill="#00FF88" opacity="0.8"/>
    <rect x="140" y="220" width="20" height="20" fill="#00FF88" opacity="0.8"/>
    <rect x="160" y="220" width="20" height="20" fill="#00FF88" opacity="0.8"/>

    <!-- T piece (purple) -->
    <rect x="180" y="220" width="20" height="20" fill="#AA44FF" opacity="0.8"/>
    <rect x="200" y="220" width="20" height="20" fill="#AA44FF" opacity="0.8"/>
    <rect x="220" y="220" width="20" height="20" fill="#AA44FF" opacity="0.8"/>
    <rect x="200" y="200" width="20" height="20" fill="#AA44FF" opacity="0.8"/>

    <!-- O piece (yellow) -->
    <rect x="120" y="220" width="20" height="20" fill="#FFEE00" opacity="0.8"/>
    <rect x="120" y="200" width="20" height="20" fill="#FFEE00" opacity="0.8"/>
    <rect x="140" y="200" width="20" height="20" fill="#FFEE00" opacity="0.8"/>
    <rect x="140" y="220" width="20" height="20" fill="#FFEE00" opacity="0.8"/>

    <!-- I piece (cyan) horizontal at top of stack -->
    <rect x="180" y="200" width="20" height="20" fill="#00FFFF" opacity="0.8"/>
    <rect x="220" y="200" width="20" height="20" fill="#00FFFF" opacity="0.8"/>
    <rect x="240" y="200" width="20" height="20" fill="#00FFFF" opacity="0.8"/>
    <rect x="260" y="180" width="20" height="20" fill="#00FFFF" opacity="0.8"/>
    <rect x="280" y="180" width="20" height="20" fill="#00FFFF" opacity="0.8"/>
  </g>

  <!-- Falling I piece (cyan) with glow -->
  <g filter="url(#glowStrong)">
    <rect x="160" y="80" width="20" height="20" fill="#00FFFF"/>
    <rect x="180" y="80" width="20" height="20" fill="#00FFFF"/>
    <rect x="200" y="80" width="20" height="20" fill="#00FFFF"/>
    <rect x="220" y="80" width="20" height="20" fill="#00FFFF"/>
  </g>

  <!-- Ghost piece (outline) -->
  <g opacity="0.3">
    <rect x="160" y="160" width="20" height="20" fill="none" stroke="#00FFFF" stroke-width="1"/>
    <rect x="180" y="160" width="20" height="20" fill="none" stroke="#00FFFF" stroke-width="1"/>
    <rect x="200" y="160" width="20" height="20" fill="none" stroke="#00FFFF" stroke-width="1"/>
    <rect x="220" y="160" width="20" height="20" fill="none" stroke="#00FFFF" stroke-width="1"/>
  </g>

  <!-- Next piece preview box -->
  <rect x="320" y="40" width="70" height="70" fill="rgba(17,17,24,0.85)" stroke="rgba(0,255,255,0.2)" stroke-width="1" rx="4"/>
  <text x="355" y="55" font-family="monospace" font-size="8" fill="rgba(0,255,255,0.5)" text-anchor="middle">NEXT</text>
  <!-- T piece preview -->
  <g filter="url(#glow)">
    <rect x="338" y="62" width="14" height="14" fill="#AA44FF"/>
    <rect x="354" y="62" width="14" height="14" fill="#AA44FF"/>
    <rect x="370" y="62" width="14" height="14" fill="#AA44FF"/>
    <rect x="354" y="78" width="14" height="14" fill="#AA44FF"/>
  </g>

  <!-- Title -->
  <text x="200" y="28" font-family="monospace" font-weight="bold" font-size="20" fill="#00FFFF" text-anchor="middle" filter="url(#glowStrong)">NEON TETRIS</text>

  <!-- Scan lines overlay -->
  <g opacity="0.04">
    <pattern id="scanlines" x="0" y="0" width="400" height="4" patternUnits="userSpaceOnUse">
      <rect width="400" height="2" fill="#00FFFF"/>
    </pattern>
    <rect width="400" height="300" fill="url(#scanlines)"/>
  </g>

  <!-- Score display -->
  <text x="60" y="60" font-family="monospace" font-size="9" fill="rgba(0,255,255,0.5)">SCORE</text>
  <text x="60" y="78" font-family="monospace" font-weight="bold" font-size="16" fill="#00FFFF" filter="url(#glow)">12,400</text>

  <text x="60" y="110" font-family="monospace" font-size="9" fill="rgba(0,255,136,0.5)">LEVEL</text>
  <text x="60" y="128" font-family="monospace" font-weight="bold" font-size="16" fill="#00FF88">7</text>

  <text x="60" y="160" font-family="monospace" font-size="9" fill="rgba(170,68,255,0.5)">LINES</text>
  <text x="60" y="178" font-family="monospace" font-weight="bold" font-size="16" fill="#AA44FF">63</text>

  <!-- Combo text -->
  <text x="60" y="220" font-family="monospace" font-size="9" fill="rgba(255,238,0,0.5)">COMBO</text>
  <text x="60" y="240" font-family="monospace" font-weight="bold" font-size="18" fill="#FFEE00" filter="url(#glow)">3x</text>

  <!-- Energy bar -->
  <text x="60" y="270" font-family="monospace" font-size="8" fill="rgba(255,0,255,0.5)">ENERGY</text>
  <rect x="60" y="276" width="60" height="8" fill="rgba(255,0,255,0.15)" rx="2"/>
  <rect x="60" y="276" width="42" height="8" fill="url(#energyGrad)" rx="2"/>
  <defs>
    <linearGradient id="energyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#FFEE00"/>
    </linearGradient>
  </defs>

  <!-- Power-up icon -->
  <text x="345" y="135" font-family="monospace" font-size="20" text-anchor="middle">⚡</text>
  <text x="345" y="150" font-family="monospace" font-size="7" fill="rgba(0,255,255,0.6)" text-anchor="middle">GHOST</text>

  <!-- PlayPixelCraft branding -->
  <text x="200" y="295" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.2)" text-anchor="middle">PlayPixelCraft.com</text>
</svg>