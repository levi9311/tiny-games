<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Jumper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        #gameCanvas {
            border: 3px solid #6a4a8a;
            border-radius: 8px;
            background: linear-gradient(#1a1a3e, #2a2a5e);
        }
        #score {
            color: #ff6b9d;
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ff6b9d;
        }
        #instructions {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        <div id="instructions">← → Move | ↑ Jump</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let score = 0;
        let gameOver = false;
        let keys = {};
        let cameraY = 0;

        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 80,
            width: 30,
            height: 30,
            vx: 0,
            vy: 0,
            speed: 5,
            jumpForce: -12,
            gravity: 0.5,
            grounded: false,
            color: '#ff6b9d'
        };

        let platforms = [];
        const platformWidth = 80;
        const platformHeight = 15;

        function generatePlatforms() {
            platforms = [];
            for (let i = 0; i < 7; i++) {
                platforms.push({
                    x: Math.random() * (canvas.width - platformWidth),
                    y: canvas.height - 100 - i * 70,
                    width: platformWidth,
                    height: platformHeight,
                    color: `hsl(${Math.random() * 60 + 240}, 70%, 60%)`
                });
            }
            platforms.push({
                x: 0,
                y: canvas.height - 20,
                width: canvas.width,
                height: 20,
                color: '#4a4a6a'
            });
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (gameOver && e.key === 'Enter') {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function resetGame() {
            score = 0;
            gameOver = false;
            cameraY = 0;
            player.x = canvas.width / 2 - 15;
            player.y = canvas.height - 80;
            player.vx = 0;
            player.vy = 0;
            generatePlatforms();
            scoreEl.textContent = 'Score: 0';
        }

        function update() {
            if (gameOver) return;

            if (keys['ArrowLeft']) {
                player.vx = -player.speed;
            } else if (keys['ArrowRight']) {
                player.vx = player.speed;
            } else {
                player.vx = 0;
            }

            if (keys['ArrowUp'] && player.grounded) {
                player.vy = player.jumpForce;
                player.grounded = false;
            }

            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;

            if (player.x < 0) player.x = canvas.width - player.width;
            if (player.x > canvas.width - player.width) player.x = 0;

            player.grounded = false;
            platforms.forEach(platform => {
                if (
                    player.vy > 0 &&
                    player.x + player.width > platform.x &&
                    player.x < platform.x + platform.width &&
                    player.y + player.height > platform.y &&
                    player.y + player.height < platform.y + platform.height + player.vy
                ) {
                    player.y = platform.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
            });

            if (player.y < canvas.height / 2) {
                let diff = canvas.height / 2 - player.y;
                player.y = canvas.height / 2;
                
                platforms.forEach(platform => {
                    platform.y += diff;
                });

                score += Math.floor(diff / 10);
                scoreEl.textContent = 'Score: ' + score;

                platforms = platforms.filter(p => p.y < canvas.height);
                
                while (platforms.length < 8) {
                    let highest = platforms.reduce((min, p) => p.y < min.y ? p : min, platforms[0]);
                    let newY = highest.y - 70 - Math.random() * 30;
                    platforms.push({
                        x: Math.random() * (canvas.width - platformWidth),
                        y: newY,
                        width: platformWidth,
                        height: platformHeight,
                        color: `hsl(${Math.random() * 60 + 240}, 70%, 60%)`
                    });
                }
            }

            if (player.y > canvas.height) {
                gameOver = true;
            }
        }

        function draw() {
            ctx.fillStyle = '#1a1a3e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            platforms.forEach(platform => {
                ctx.fillStyle = platform.color;
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(platform.x, platform.y, platform.width, 3);
            });

            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 5, player.y + 5, 8, 8);
            ctx.fillRect(player.x + player.width - 13, player.y + 5, 8, 8);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.font = '20px Arial';
                ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('Press Enter to Restart', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        generatePlatforms();
        gameLoop();
    </script>
</body>
</html>
