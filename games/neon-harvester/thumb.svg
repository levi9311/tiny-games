<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A1A"/>
      <stop offset="100%" style="stop-color:#0D1A2A"/>
    </linearGradient>
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="30%" style="stop-color:#00FFFF"/>
      <stop offset="70%" style="stop-color:#0066AA"/>
      <stop offset="100%" style="stop-color:#000033"/>
    </radialGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Central neon core -->
  <circle cx="600" cy="315" r="120" fill="url(#coreGradient)" filter="url(#neonGlow)"/>
  <circle cx="600" cy="315" r="100" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0.6"/>
  <circle cx="600" cy="315" r="140" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.3" stroke-dasharray="20,15"/>
  
  <!-- Orbiting electrons -->
  <ellipse cx="600" cy="315" rx="180" ry="50" fill="none" stroke="rgba(0,255,255,0.2)" stroke-width="2"/>
  <circle cx="780" cy="315" r="12" fill="#00FFFF" filter="url(#neonGlow)"/>
  <circle cx="420" cy="315" r="12" fill="#FF00FF" filter="url(#neonGlow)"/>
  
  <!-- Data particles -->
  <g fill="#00FFFF" filter="url(#neonGlow)">
    <polygon points="500,200 506,206 500,212 494,206" opacity="0.8"/>
    <polygon points="700,180 706,186 700,192 694,186" opacity="0.6"/>
    <polygon points="550,420 556,426 550,432 544,426" opacity="0.7"/>
    <polygon points="680,450 686,456 680,462 674,456" opacity="0.5"/>
  </g>
  
  <!-- Facility icons (pixel art style) -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="60" height="60" fill="rgba(0,255,255,0.1)" stroke="#00FFFF" stroke-width="2"/>
    <text x="30" y="40" text-anchor="middle" fill="#00FFFF" font-size="30" font-family="monospace">📡</text>
  </g>
  
  <g transform="translate(150, 180)">
    <rect x="0" y="0" width="60" height="60" fill="rgba(0,255,136,0.1)" stroke="#00FF88" stroke-width="2"/>
    <text x="30" y="40" text-anchor="middle" fill="#00FF88" font-size="30" font-family="monospace">🕷️</text>
  </g>
  
  <g transform="translate(150, 260)">
    <rect x="0" y="0" width="60" height="60" fill="rgba(255,0,255,0.1)" stroke="#FF00FF" stroke-width="2"/>
    <text x="30" y="40" text-anchor="middle" fill="#FF00FF" font-size="30" font-family="monospace">🔓</text>
  </g>
  
  <!-- Right side facility icons -->
  <g transform="translate(990, 180)">
    <rect x="0" y="0" width="60" height="60" fill="rgba(255,238,0,0.1)" stroke="#FFEE00" stroke-width="2"/>
    <text x="30" y="40" text-anchor="middle" fill="#FFEE00" font-size="30" font-family="monospace">🌐</text>
  </g>
  
  <g transform="translate(990, 260)">
    <rect x="0" y="0" width="60" height="60" fill="rgba(170,68,255,0.1)" stroke="#AA44FF" stroke-width="2"/>
    <text x="30" y="40" text-anchor="middle" fill="#AA44FF" font-size="30" font-family="monospace">🧠</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#00FFFF" font-size="48" font-weight="bold" font-family="Courier New, monospace" filter="url(#neonGlow)" letter-spacing="4">
    NEON HARVESTER
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="115" text-anchor="middle" fill="#FF00FF" font-size="20" font-family="Courier New, monospace" letter-spacing="2">
    CYBERPUNK IDLE CLICKER
  </text>
  
  <!-- Currency display -->
  <g transform="translate(600, 520)">
    <text x="0" y="0" text-anchor="middle" fill="#00FFFF" font-size="36" font-weight="bold" font-family="Courier New, monospace" filter="url(#neonGlow)">
      $<tspan fill="#FFFFFF">1.2M</tspan> DF
    </text>
    <text x="0" y="35" text-anchor="middle" fill="#00FF88" font-size="18" font-family="Courier New, monospace">
      +2.5K/s
    </text>
  </g>
  
  <!-- Decorative corners -->
  <g stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 20,20 L 60,20 L 60,25 L 25,25 L 25,60 L 20,60 Z"/>
    <path d="M 1180,20 L 1140,20 L 1140,25 L 1175,25 L 1175,60 L 1180,60 Z"/>
    <path d="M 20,610 L 60,610 L 60,605 L 25,605 L 25,570 L 20,570 Z"/>
    <path d="M 1180,610 L 1140,610 L 1140,605 L 1175,605 L 1175,570 L 1180,570 Z"/>
  </g>
  
  <!-- PlayPixelCraft branding -->
  <text x="600" y="600" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14" font-family="Courier New, monospace">
    PLAYPIXELCRAFT.COM
  </text>
</svg>
