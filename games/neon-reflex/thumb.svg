<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <rect width="1" height="20" fill="rgba(0,255,255,0.06)"/>
      <rect width="20" height="1" fill="rgba(0,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="url(#bg)"/>
  <rect width="400" height="200" fill="url(#grid)"/>

  <!-- Decorative corner brackets -->
  <g stroke="#00ffff" stroke-width="2" fill="none" opacity="0.5">
    <polyline points="12,28 12,12 28,12"/>
    <polyline points="372,12 388,12 388,28"/>
    <polyline points="12,172 12,188 28,188"/>
    <polyline points="372,188 388,188 388,172"/>
  </g>

  <!-- ===== TARGET 1: Main cyan circle (pixelated) ===== -->
  <g filter="url(#glowBig)" transform="translate(96, 88)">
    <!-- Glow ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.2" stroke-dasharray="8 6"/>
    <!-- Life arc -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.5"
            stroke-dasharray="190 50" stroke-dashoffset="-25" stroke-linecap="round"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="30" fill="rgba(0,255,255,0.08)" stroke="#00ffff" stroke-width="2"/>
    <!-- Inner bright -->
    <circle cx="0" cy="0" r="18" fill="rgba(0,255,255,0.15)" stroke="#00ffff" stroke-width="1.5"/>
    <!-- Core dot -->
    <circle cx="0" cy="0" r="6" fill="#00ffff"/>
    <!-- Pixel accent corners -->
    <g fill="#00ffff" opacity="0.8">
      <rect x="-38" y="-2" width="8" height="4" rx="1"/>
      <rect x="30" y="-2" width="8" height="4" rx="1"/>
      <rect x="-2" y="-38" width="4" height="8" rx="1"/>
      <rect x="-2" y="30" width="4" height="8" rx="1"/>
    </g>
  </g>

  <!-- ===== TARGET 2: Magenta (background, upper right) ===== -->
  <g filter="url(#glow)" opacity="0.7" transform="translate(290, 45)">
    <circle cx="0" cy="0" r="24" fill="rgba(255,0,255,0.08)" stroke="#ff00ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="14" fill="rgba(255,0,255,0.12)" stroke="#ff00ff" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#ff00ff"/>
  </g>

  <!-- ===== TARGET 3: Yellow (small, far right) ===== -->
  <g filter="url(#glow)" opacity="0.55" transform="translate(340, 140)">
    <circle cx="0" cy="0" r="20" fill="rgba(255,238,0,0.08)" stroke="#ffee00" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="11" fill="rgba(255,238,0,0.12)" stroke="#ffee00" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#ffee00"/>
  </g>

  <!-- ===== Pixel particles (hit effect) ===== -->
  <g fill="#00ffff" opacity="0.7" filter="url(#glow)">
    <rect x="52" y="60" width="5" height="5" rx="1"/>
    <rect x="44" y="72" width="4" height="4" rx="1"/>
    <rect x="60" y="68" width="3" height="3"/>
    <rect x="38" y="82" width="4" height="4" rx="1"/>
    <rect x="56" y="100" width="3" height="3"/>
    <rect x="130" y="54" width="4" height="4" rx="1"/>
    <rect x="140" y="66" width="3" height="3"/>
    <rect x="126" y="78" width="5" height="5" rx="1"/>
  </g>
  <g fill="#ff00ff" opacity="0.5" filter="url(#glow)">
    <rect x="260" y="90" width="4" height="4" rx="1"/>
    <rect x="270" y="80" width="3" height="3"/>
    <rect x="310" y="75" width="4" height="4" rx="1"/>
  </g>
  <g fill="#ffee00" opacity="0.4" filter="url(#glow)">
    <rect x="360" y="100" width="3" height="3"/>
    <rect x="370" y="120" width="4" height="4" rx="1"/>
  </g>

  <!-- ===== Tap cursor ===== -->
  <g transform="translate(96, 78)" filter="url(#glow)" opacity="0.9">
    <polygon points="0,0 0,24 6,18 12,28 16,26 10,16 18,14" fill="white" stroke="#00ffff" stroke-width="1"/>
  </g>

  <!-- ===== +100 floating text ===== -->
  <g filter="url(#glow)">
    <text x="60" y="42" font-family="'Courier New',monospace" font-weight="bold" font-size="16" fill="#00ff88">+100</text>
  </g>

  <!-- ===== x5 COMBO ===== -->
  <g filter="url(#glow)">
    <text x="130" y="36" font-family="'Courier New',monospace" font-weight="bold" font-size="12" fill="#ff00ff">x5 COMBO</text>
  </g>

  <!-- ===== Title ===== -->
  <g filter="url(#glow)">
    <text x="200" y="178" font-family="'Courier New',monospace" font-weight="bold" font-size="28" fill="#00ffff" text-anchor="middle" letter-spacing="6">NEON REFLEX</text>
  </g>

  <!-- Subtitle -->
  <text x="200" y="196" font-family="'Courier New',monospace" font-size="10" fill="#00ffff" text-anchor="middle" opacity="0.4" letter-spacing="2">⚡ REACTION CHALLENGE ⚡</text>

  <!-- Bottom accent line -->
  <line x1="100" y1="185" x2="300" y2="185" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>
</svg>
