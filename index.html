<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Game Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-ZQNX0P15SB"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-ZQNX0P15SB");
    </script>
    <style>
      /* ---------- 背景霓虹线条 ---------- */
      body {
        background: #0a0a0a;
        overflow-x: hidden;
      }
      .neon-lines {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        overflow: hidden;
      }
      .neon-line {
        position: absolute;
        width: 2px;
        height: 100%;
        background: linear-gradient(to bottom, #0ff, #f0f, #ff0, #0ff);
        opacity: 0.3;
        animation: floatLine linear infinite;
      }
      @keyframes floatLine {
        0% {
          transform: translateY(-100%) scaleX(1);
        }
        100% {
          transform: translateY(100%) scaleX(1);
        }
      }

      /* ---------- Neon 文本 ---------- */
      .neon-text {
        color: #0ff;
        text-shadow:
          0 0 5px #0ff,
          0 0 10px #0ff,
          0 0 20px #0ff,
          0 0 40px #f0f;
      }

      /* ---------- 卡片 hover 光流动 ---------- */
      .neon-border {
        border: 2px solid transparent;
        border-radius: 0.5rem;
        background:
          linear-gradient(#0a0a0a, #0a0a0a) padding-box,
          linear-gradient(90deg, #ff00ff, #00ffff, #ff0, #f0f) border-box;
        background-origin: border-box;
        background-clip: padding-box, border-box;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .neon-border::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          120deg,
          #ff00ff,
          #00ffff,
          #ff0,
          #f0f,
          #ff00ff
        );
        background-size: 400% 400%;
        z-index: 0;
        opacity: 0;
        transition: opacity 0.3s;
        animation: glowBorder 5s linear infinite;
      }
      @keyframes glowBorder {
        0% {
          background-position: 0% 0%;
        }
        50% {
          background-position: 100% 100%;
        }
        100% {
          background-position: 0% 0%;
        }
      }
      .neon-border:hover::after {
        opacity: 1;
      }
      .neon-border > * {
        position: relative;
        z-index: 1;
      }

      /* ---------- Glow 按钮 ---------- */
      .glow-button {
        background: linear-gradient(90deg, #ff00ff, #00ffff);
        color: white;
        text-shadow: 0 0 5px #fff;
        transition:
          box-shadow 0.3s,
          transform 0.2s;
      }
      .glow-button:hover {
        box-shadow:
          0 0 10px #0ff,
          0 0 20px #ff0,
          0 0 30px #f0f;
        transform: translateY(-2px);
      }

      /* ---------- 搜索栏 ---------- */
      .search-input {
        background-color: #111;
        border: 1px solid #0ff;
        color: #0ff;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
      }
      .search-input::placeholder {
        color: #0ff;
        opacity: 0.6;
      }
    </style>
  </head>
  <body class="text-white min-h-screen flex flex-col">
    <!-- 背景霓虹线条 -->
    <div class="neon-lines" id="neon-lines"></div>

    <!-- header -->
    <header class="p-6 text-center z-10 relative">
      <h1 class="text-4xl md:text-5xl font-bold neon-text">AI Game Factory</h1>
      <p class="mt-2 text-lg md:text-xl opacity-80 neon-text">
        Daily AI Generated Games
      </p>

      <!-- 搜索栏 -->
      <div class="mt-4 flex justify-center gap-2">
        <input
          type="text"
          id="search"
          placeholder="Search games..."
          class="search-input w-60 md:w-96"
        />
        <button class="glow-button px-4 py-2 rounded-md font-bold">
          Search
        </button>
      </div>

      <!-- 分类 -->
      <div class="mt-4 flex justify-center gap-2 flex-wrap">
        <button class="glow-button px-3 py-1 rounded-full text-sm">
          Latest
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm">
          Popular
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm">
          Action
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm">
          Puzzle
        </button>
      </div>
    </header>

    <!-- main content -->
    <main
      class="flex-1 max-w-6xl mx-auto p-4 grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 z-10 relative"
    >
      <!-- 动态游戏列表 -->
    </main>

    <script>
      // 生成随机背景线条
      const neonLines = document.getElementById("neon-lines");
      for (let i = 0; i < 30; i++) {
        const line = document.createElement("div");
        line.className = "neon-line";
        line.style.left = Math.random() * 100 + "%";
        line.style.animationDuration = 5 + Math.random() * 10 + "s";
        neonLines.appendChild(line);
      }

      // 渲染游戏卡片
      fetch("/games.json")
        .then((r) => r.json())
        .then((games) => {
          const main = document.querySelector("main");
          const searchInput = document.getElementById("search");

          function renderList(filteredGames) {
            main.innerHTML = "";
            filteredGames.forEach((g) => {
              const card = document.createElement("div");
              card.className =
                "flex flex-col bg-gray-900 neon-border shadow-lg transition transform hover:-translate-y-1";
              card.innerHTML = `
            <img src="${g.thumb}" alt="${g.title}" class="h-40 w-full object-cover">
            <div class="p-4 flex-1 flex flex-col">
              <h2 class="font-bold text-lg mb-2 neon-text">${g.title}</h2>
              <p class="text-gray-300 text-sm flex-1">${g.desc}</p>
              <a href="${g.url}" class="mt-3 py-2 text-center rounded-md glow-button font-bold">
                Play Now
              </a>
            </div>
          `;
              main.appendChild(card);
            });
          }

          renderList(games);

          // 搜索功能
          searchInput.addEventListener("input", () => {
            const query = searchInput.value.toLowerCase();
            renderList(
              games.filter((g) => g.title.toLowerCase().includes(query)),
            );
          });
        });
    </script>
  </body>
</html>
