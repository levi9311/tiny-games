<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
    <title>PlayPixelCraft - AI Generated Browser Games</title>
    <meta name="description" content="PlayPixelCraft is a collection of free AI-generated browser games with cyberpunk neon style. Play instantly on desktop, mobile, and tablet. No downloads required.">
    <meta name="keywords" content="browser games, AI games, free online games, cyberpunk games, HTML5 games, pixel games, casual games, PlayPixelCraft">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://playpixelcraft.com/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="PlayPixelCraft - AI Generated Browser Games">
    <meta property="og:description" content="Free AI-generated browser games with cyberpunk neon style. Play instantly, no downloads required.">
    <meta property="og:url" content="https://playpixelcraft.com/">
    <meta property="og:site_name" content="PlayPixelCraft">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PlayPixelCraft - AI Generated Browser Games">
    <meta name="twitter:description" content="Free AI-generated browser games with cyberpunk neon style. Play instantly, no downloads required.">

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PlayPixelCraft",
      "url": "https://playpixelcraft.com/",
      "description": "Free AI-generated browser games with cyberpunk neon style."
    }
    </script>

    <!-- JSON-LD: ItemList (game collection) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "PlayPixelCraft Game Collection",
      "description": "A curated collection of AI-generated browser games.",
      "numberOfItems": 2,
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": {
            "@type": "VideoGame",
            "name": "Neon Reflex",
            "url": "https://playpixelcraft.com/games/neon-reflex/",
            "description": "A cyberpunk reaction speed game. Tap glowing targets before they fade away!",
            "genre": ["Reaction Game", "Casual Game"],
            "gamePlatform": ["Web Browser", "HTML5"],
            "applicationCategory": "Game",
            "operatingSystem": "Any",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "image": "https://playpixelcraft.com/games/neon-reflex/thumb.svg",
            "playMode": ["SinglePlayer"],
            "author": { "@type": "Organization", "name": "PlayPixelCraft" }
          }
        },
        {
          "@type": "ListItem",
          "position": 2,
          "item": {
            "@type": "VideoGame",
            "name": "Neon Merge",
            "url": "https://playpixelcraft.com/games/neon-merge/",
            "description": "Drop neon orbs and merge matching colors to evolve them into powerful cores!",
            "genre": ["Merge Game", "Casual Game", "Tap Game"],
            "gamePlatform": ["Web Browser", "HTML5"],
            "applicationCategory": "Game",
            "operatingSystem": "Any",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "image": "https://playpixelcraft.com/games/neon-merge/thumb.svg",
            "playMode": ["SinglePlayer"],
            "author": { "@type": "Organization", "name": "PlayPixelCraft" }
          }
        }
      ]
    }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-ZQNX0P15SB"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-ZQNX0P15SB");
    </script>
    <style>
      /* ---------- 背景霓虹线条 ---------- */
      body {
        background: #0a0a0a;
        overflow-x: hidden;
      }
      .neon-lines {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        overflow: hidden;
      }
      .neon-line {
        position: absolute;
        width: 2px;
        height: 100%;
        background: linear-gradient(to bottom, #0ff, #f0f, #ff0, #0ff);
        opacity: 0.3;
        animation: floatLine linear infinite;
      }
      @keyframes floatLine {
        0% {
          transform: translateY(-100%) scaleX(1);
        }
        100% {
          transform: translateY(100%) scaleX(1);
        }
      }

      /* ---------- Neon 文本 ---------- */
      .neon-text {
        color: #0ff;
        text-shadow:
          0 0 5px #0ff,
          0 0 10px #0ff,
          0 0 20px #0ff,
          0 0 40px #f0f;
      }

      /* ---------- 卡片 hover 光流动 ---------- */
      .neon-border {
        border: 2px solid transparent;
        border-radius: 0.5rem;
        background:
          linear-gradient(#0a0a0a, #0a0a0a) padding-box,
          linear-gradient(90deg, #ff00ff, #00ffff, #ff0, #f0f) border-box;
        background-origin: border-box;
        background-clip: padding-box, border-box;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .neon-border::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          120deg,
          #ff00ff,
          #00ffff,
          #ff0,
          #f0f,
          #ff00ff
        );
        background-size: 400% 400%;
        z-index: 0;
        opacity: 0;
        transition: opacity 0.3s;
        animation: glowBorder 5s linear infinite;
      }
      @keyframes glowBorder {
        0% {
          background-position: 0% 0%;
        }
        50% {
          background-position: 100% 100%;
        }
        100% {
          background-position: 0% 0%;
        }
      }
      .neon-border:hover::after {
        opacity: 1;
      }
      .neon-border > * {
        position: relative;
        z-index: 1;
      }

      /* ---------- Glow 按钮 ---------- */
      .glow-button {
        background: linear-gradient(90deg, #ff00ff, #00ffff);
        color: white;
        text-shadow: 0 0 5px #fff;
        transition:
          box-shadow 0.3s,
          transform 0.2s;
      }
      .glow-button:hover {
        box-shadow:
          0 0 10px #0ff,
          0 0 20px #ff0,
          0 0 30px #f0f;
        transform: translateY(-2px);
      }

      /* ---------- 搜索栏 ---------- */
      .search-input {
        background-color: #111;
        border: 1px solid #0ff;
        color: #0ff;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
      }
      .search-input::placeholder {
        color: #0ff;
        opacity: 0.6;
      }

      /* Active button */
      .glow-button.active {
        box-shadow:
          0 0 8px #0ff,
          0 0 16px #f0f;
      }
      .glow-button:not(.active) {
        opacity: 0.5;
        background: linear-gradient(90deg, #333, #444);
      }
      .glow-button:not(.active):hover {
        opacity: 0.8;
      }
    </style>
  </head>
  <body class="text-white min-h-screen flex flex-col">
    <!-- 背景霓虹线条 -->
    <div class="neon-lines" id="neon-lines"></div>

    <!-- header -->
    <header class="p-6 text-center z-10 relative">
      <div class="flex items-center justify-center gap-2 mb-2">
        <img src="/assets/logo.svg" alt="PlayPixelCraft" class="h-12 sm:h-14">
      </div>
      <p class="text-base md:text-lg text-gray-400">
        Play a new AI-generated game every day. No download.
      </p>

      <!-- 搜索栏 -->
      <div class="mt-4 flex justify-center gap-2">
        <input
          type="text"
          id="search"
          placeholder="Search games..."
          class="search-input w-60 md:w-96"
        />
        <button id="searchBtn" class="glow-button px-4 py-2 rounded-md font-bold">
          Search
        </button>
      </div>

      <!-- 排序 & 分类 -->
      <div class="mt-4 flex justify-center gap-2 flex-wrap">
        <button class="glow-button px-3 py-1 rounded-full text-sm sort-btn active" data-sort="latest">
          Latest
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm sort-btn" data-sort="popular">
          Popular
        </button>
        <span class="text-gray-600 mx-1">|</span>
        <button class="glow-button px-3 py-1 rounded-full text-sm filter-btn active" data-filter="All">
          All
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm filter-btn" data-filter="Reaction">
          Reaction
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm filter-btn" data-filter="Puzzle">
          Puzzle
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm filter-btn" data-filter="Action">
          Action
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm filter-btn" data-filter="Casual">
          Casual
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm filter-btn" data-filter="Rhythm">
          Rhythm
        </button>
        <button class="glow-button px-3 py-1 rounded-full text-sm filter-btn" data-filter="Idle">
          Idle
        </button>
      </div>
    </header>

    <!-- main content -->
    <main
      class="flex-1 max-w-6xl mx-auto p-4 grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 z-10 relative"
    >
      <!-- 动态游戏列表 -->
    </main>

    <script>
      // 生成随机背景线条
      const neonLines = document.getElementById("neon-lines");
      for (let i = 0; i < 30; i++) {
        const line = document.createElement("div");
        line.className = "neon-line";
        line.style.left = Math.random() * 100 + "%";
        line.style.animationDuration = 5 + Math.random() * 10 + "s";
        neonLines.appendChild(line);
      }

      // State
      let currentSort = "latest";
      let currentFilter = "All";
      let searchQuery = "";

      // 渲染游戏卡片
      fetch("/games.json")
        .then((r) => r.json())
        .then((games) => {
          const main = document.querySelector("main");
          const searchInput = document.getElementById("search");

          function getFilteredSortedGames() {
            let filtered = [...games];

            // Filter by category
            if (currentFilter !== "All") {
              filtered = filtered.filter(
                (g) => g.category && g.category === currentFilter
              );
            }

            // Filter by search query (title + desc)
            if (searchQuery) {
              const q = searchQuery.toLowerCase();
              filtered = filtered.filter(
                (g) =>
                  g.title.toLowerCase().includes(q) ||
                  (g.desc && g.desc.toLowerCase().includes(q)) ||
                  (g.category && g.category.toLowerCase().includes(q))
              );
            }

            // Sort
            if (currentSort === "latest") {
              filtered.sort(
                (a, b) => new Date(b.date || 0) - new Date(a.date || 0)
              );
            } else if (currentSort === "popular") {
              filtered.sort((a, b) => (b.plays || 0) - (a.plays || 0));
            }

            return filtered;
          }

          function renderList(gamesToRender) {
            main.innerHTML = "";
            if (gamesToRender.length === 0) {
              main.innerHTML = `
                <div class="col-span-full text-center py-20">
                  <p class="text-gray-500 text-lg">No games found</p>
                  <p class="text-gray-600 text-sm mt-2">Try a different search or category</p>
                </div>
              `;
              return;
            }
            gamesToRender.forEach((g) => {
              const card = document.createElement("div");
              card.className =
                "flex flex-col bg-gray-900 neon-border shadow-lg transition transform hover:-translate-y-1";
              card.innerHTML = `
            <a href="${g.url}">
              <img src="${g.thumb}" alt="${g.title}" class="h-40 w-full object-cover">
            </a>
            <div class="p-4 flex-1 flex flex-col">
              <div class="flex items-center justify-between mb-2">
                <h2 class="font-bold text-lg neon-text">${g.title}</h2>
                ${g.category ? `<span class="text-[10px] uppercase tracking-wider px-2 py-0.5 border border-cyan-800 text-cyan-400 rounded-full">${g.category}</span>` : ""}
              </div>
              <p class="text-gray-300 text-sm flex-1">${g.desc}</p>
              <a href="${g.url}" class="mt-3 py-2 text-center rounded-md glow-button font-bold">
                Play Now
              </a>
            </div>
          `;
              main.appendChild(card);
            });
          }

          // Initial render
          renderList(getFilteredSortedGames());

          // Search: match title + desc (real-time + button + enter)
          searchInput.addEventListener("input", () => {
            searchQuery = searchInput.value.trim();
            renderList(getFilteredSortedGames());
          });
          searchInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
              searchQuery = searchInput.value.trim();
              renderList(getFilteredSortedGames());
            }
          });
          document.getElementById("searchBtn").addEventListener("click", () => {
            searchQuery = searchInput.value.trim();
            renderList(getFilteredSortedGames());
          });

          // Sort buttons (Latest / Popular)
          document.querySelectorAll(".sort-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
              document.querySelectorAll(".sort-btn").forEach((b) => b.classList.remove("active"));
              btn.classList.add("active");
              currentSort = btn.dataset.sort;
              renderList(getFilteredSortedGames());
            });
          });

          // Filter buttons (All / Reaction / Puzzle / ...)
          document.querySelectorAll(".filter-btn").forEach((btn) => {
            btn.addEventListener("click", () => {
              document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
              btn.classList.add("active");
              currentFilter = btn.dataset.filter;
              renderList(getFilteredSortedGames());
            });
          });

          // Dynamically generate filter buttons from available categories
          const categories = [...new Set(games.map((g) => g.category).filter(Boolean))].sort();
          const filterContainer = document.querySelector(".filter-btn").parentElement;
          categories.forEach((cat) => {
            const exists = filterContainer.querySelector(`[data-filter="${cat}"]`);
            if (!exists) {
              const btn = document.createElement("button");
              btn.className = "glow-button px-3 py-1 rounded-full text-sm filter-btn";
              btn.dataset.filter = cat;
              btn.textContent = cat;
              filterContainer.appendChild(btn);
              btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
                btn.classList.add("active");
                currentFilter = cat;
                renderList(getFilteredSortedGames());
              });
            }
          });
        });
    </script>
  </body>
</html>
