<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 44" width="280" height="44">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="50%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#ffee00"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pixel icon: gamepad shape -->
  <g filter="url(#g)">
    <!-- Controller body -->
    <rect x="0" y="8" width="6" height="6" fill="#0ff" rx="1"/>
    <rect x="6" y="2" width="6" height="6" fill="#0ff" rx="1"/>
    <rect x="12" y="2" width="6" height="6" fill="#f0f" rx="1"/>
    <rect x="18" y="2" width="6" height="6" fill="#f0f" rx="1"/>
    <rect x="24" y="2" width="6" height="6" fill="#f0f" rx="1"/>
    <rect x="24" y="8" width="6" height="6" fill="#f0f" rx="1"/>
    <rect x="24" y="14" width="6" height="6" fill="#ff0" rx="1"/>
    <rect x="24" y="20" width="6" height="6" fill="#ff0" rx="1"/>
    <rect x="24" y="26" width="6" height="6" fill="#ff0" rx="1"/>
    <rect x="24" y="32" width="6" height="6" fill="#ff0" rx="1"/>
    <rect x="0" y="14" width="6" height="6" fill="#0ff" rx="1"/>
    <rect x="0" y="20" width="6" height="6" fill="#0ff" rx="1"/>
    <rect x="0" y="26" width="6" height="6" fill="#0ff" rx="1"/>
    <rect x="6" y="32" width="6" height="6" fill="#0ff" rx="1"/>
    <rect x="12" y="32" width="6" height="6" fill="#ff0" rx="1"/>
    <rect x="18" y="32" width="6" height="6" fill="#ff0" rx="1"/>
    <!-- D-pad -->
    <rect x="6" y="14" width="4" height="4" fill="#0ff" opacity="0.6"/>
    <rect x="10" y="14" width="4" height="4" fill="#0ff" opacity="0.6"/>
    <rect x="14" y="14" width="4" height="4" fill="#0ff" opacity="0.6"/>
    <rect x="10" y="10" width="4" height="4" fill="#0ff" opacity="0.6"/>
    <rect x="10" y="18" width="4" height="4" fill="#0ff" opacity="0.6"/>
    <!-- Buttons -->
    <circle cx="20" cy="12" r="2.5" fill="#ff2d95" opacity="0.7"/>
    <circle cx="24" cy="22" r="2.5" fill="#0ff" opacity="0.7"/>
  </g>

  <!-- Text: PlayPixelCraft -->
  <text x="36" y="30" font-family="'Courier New',monospace" font-weight="900" font-size="26" fill="url(#lg)" letter-spacing="2">PlayPixelCraft</text>
</svg>
