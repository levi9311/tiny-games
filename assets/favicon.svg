<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="url(#bg)"/>
  <rect width="64" height="64" rx="8" fill="none" stroke="#0ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Pixel "P" - PlayPixelCraft -->
  <g filter="url(#g)">
    <!-- P body: pixel blocks -->
    <rect x="12" y="10" width="6" height="6" fill="#0ff"/>
    <rect x="18" y="10" width="6" height="6" fill="#0ff"/>
    <rect x="24" y="10" width="6" height="6" fill="#0ff"/>
    <rect x="30" y="10" width="6" height="6" fill="#f0f"/>
    <rect x="12" y="16" width="6" height="6" fill="#0ff"/>
    <rect x="30" y="16" width="6" height="6" fill="#f0f"/>
    <rect x="36" y="16" width="6" height="6" fill="#f0f"/>
    <rect x="12" y="22" width="6" height="6" fill="#0ff"/>
    <rect x="18" y="22" width="6" height="6" fill="#0ff"/>
    <rect x="24" y="22" width="6" height="6" fill="#0ff"/>
    <rect x="30" y="22" width="6" height="6" fill="#f0f"/>
    <rect x="12" y="28" width="6" height="6" fill="#0ff"/>
    <rect x="12" y="34" width="6" height="6" fill="#0ff"/>
    <rect x="12" y="40" width="6" height="6" fill="#0ff"/>
    <rect x="18" y="40" width="6" height="6" fill="#0ff"/>
    <rect x="24" y="40" width="6" height="6" fill="#ff0"/>
    <rect x="30" y="40" width="6" height="6" fill="#ff0"/>
    <rect x="36" y="40" width="6" height="6" fill="#ff0"/>
    <rect x="42" y="40" width="6" height="6" fill="#ff0"/>
    <rect x="48" y="40" width="6" height="6" fill="#ff0"/>
  </g>

  <!-- D-pad pixel accent (game controller hint) -->
  <g opacity="0.35">
    <rect x="14" y="50" width="4" height="4" fill="#f0f"/>
    <rect x="18" y="50" width="4" height="4" fill="#f0f"/>
    <rect x="22" y="50" width="4" height="4" fill="#f0f"/>
    <rect x="18" y="46" width="4" height="4" fill="#f0f"/>
    <rect x="18" y="54" width="4" height="4" fill="#f0f"/>
  </g>

  <!-- A/B buttons -->
  <g opacity="0.35">
    <circle cx="42" cy="50" r="3" fill="#0ff"/>
    <circle cx="50" cy="50" r="3" fill="#ff2d95"/>
  </g>
</svg>
